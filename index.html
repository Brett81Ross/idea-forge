<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Forge — Spatial OS</title>

<style>

/* =========================
   BASE
========================= */

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* =========================
   BOOT SCREEN
========================= */

.boot{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;

  animation:bootOut 3s ease forwards;
  animation-delay:2.2s;
}

.boot h1{
  font-size:28px;
  opacity:0.8;
  letter-spacing:3px;
  animation:fadeIn 1s ease forwards;
}

.boot p{
  opacity:0.4;
  animation:fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes bootOut{
  to{opacity:0; visibility:hidden;}
}

/* =========================
   MAIN WORLD (3D CAMERA)
========================= */

.world{
  transform-style:preserve-3d;
  perspective:1600px;
  transform:scale(1.2);
  opacity:0;

  animation:worldIn 2.5s ease forwards;
  animation-delay:2.2s;
}

@keyframes worldIn{
  from{opacity:0; transform:scale(1.4) rotateX(20deg);}
  to{opacity:1; transform:scale(1) rotateX(0deg);}
}

/* =========================
   HEADER + LOGO
========================= */

header{
  text-align:center;
  padding:60px 20px;
  transform:translateZ(80px);
}

.logo{
  width:110px;
  filter:drop-shadow(0 0 30px rgba(90,200,250,.4));
  transform:scale(0.2);
  opacity:0;

  animation:logoIn 2.2s ease forwards;
  animation-delay:2.6s;
}

@keyframes logoIn{
  0%{transform:scale(0.2) translateY(30px); opacity:0;}
  60%{transform:scale(1.3) translateY(-10px); opacity:1;}
  100%{transform:scale(1) translateY(0px); opacity:1;}
}

h1{
  margin:10px 0 0;
  letter-spacing:2px;
  opacity:0;
  animation:fadeIn 1s ease forwards;
  animation-delay:3s;
}

/* =========================
   CARDS (SPATIAL FLOAT IN)
========================= */

.container{
  width:90%;
  max-width:900px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:20px;
  margin:20px 0;

  transform:translateZ(-300px) scale(0.6);
  opacity:0;

  animation:cardIn 1s ease forwards;
}

.card:nth-child(1){ animation-delay:3.2s; }
.card:nth-child(2){ animation-delay:3.5s; }
.card:nth-child(3){ animation-delay:3.8s; }

@keyframes cardIn{
  to{
    transform:translateZ(0px) scale(1);
    opacity:1;
  }
}

/* =========================
   INPUTS
========================= */

input,textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(0,0,0,0.4);
  color:white;
}

/* =========================
   BUTTON
========================= */

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#0a84ff;
  color:white;
  cursor:pointer;
}

/* =========================
   SYSTEM READY TEXT
========================= */

.system{
  position:fixed;
  bottom:20px;
  left:20px;
  font-size:12px;
  opacity:0;

  animation:sysOn 1s ease forwards;
  animation-delay:4s;
}

@keyframes sysOn{
  to{opacity:0.5;}
}

</style>
</head>

<body>

<!-- BOOT -->
<div class="boot">
  <h1>IDEA FORGE OS</h1>
  <p>Initializing Spatial System...</p>
</div>

<!-- SYSTEM READY -->
<div class="system">SYSTEM READY</div>

<!-- WORLD -->
<div class="world">

<header>
  <img src="logo.png" class="logo">
  <h1>IDEA FORGE</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Submit Idea</h2>
    <input placeholder="Idea title">
    <textarea placeholder="Describe your invention"></textarea>
    <button onclick="clickSound()">Launch Idea</button>
  </div>

  <div class="card">
    <h2>Live Feed</h2>
    <p>Ideas will appear here in spatial mode.</p>
  </div>

</div>

</div>

<script>

/* =========================
   AUDIO ENGINE (NO FILES NEEDED)
========================= */

let audioCtx;

function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function clickSound(){

  if(!audioCtx) initAudio();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 520;

  gain.gain.value = 0.05;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime + 0.3
  );

  osc.stop(audioCtx.currentTime + 0.3);
}

/* =========================
   STARTUP HUM
========================= */

window.addEventListener("load", ()=>{

  initAudio();

  const hum = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  hum.type = "sine";
  hum.frequency.value = 60;

  gain.gain.value = 0.02;

  hum.connect(gain);
  gain.connect(audioCtx.destination);

  hum.start();

  setTimeout(()=>{
    gain.gain.exponentialRampToValueAtTime(
      0.0001,
      audioCtx.currentTime + 2
    );
    hum.stop(audioCtx.currentTime + 2);
  }, 800);

});

</script>

</body>
</html>
