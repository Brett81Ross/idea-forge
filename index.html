<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Idea Forge — Vision Pro</title>

<style>
/* =========================
   VISION PRO AESTHETIC UI
========================= */

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: radial-gradient(circle at top, #1c1f2a, #05060a);
  color: #f5f5f7;
  overflow-x: hidden;
}

/* Ambient glow background */
body::before,
body::after {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  z-index: -1;
  opacity: 0.35;
}

body::before {
  background: #4da3ff;
  top: -120px;
  left: -120px;
}

body::after {
  background: #9b5cff;
  bottom: -150px;
  right: -150px;
}

/* HEADER */
header {
  text-align: center;
  padding: 70px 20px 30px;
}

header h1 {
  font-size: 54px;
  font-weight: 700;
  letter-spacing: -1.5px;
  margin: 0;
  background: linear-gradient(90deg, #ffffff, #8ab4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  color: rgba(255,255,255,0.6);
  margin-top: 10px;
  font-size: 16px;
}

/* LAYOUT */
.container {
  display: flex;
  flex-direction: column;
  gap: 24px;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* GLASS CARDS */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-radius: 24px;
  padding: 22px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
  transition: all 0.35s ease;
}

.card:hover {
  transform: translateY(-6px) scale(1.01);
}

/* INPUTS */
input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(0,0,0,0.35);
  color: white;
  outline: none;
  font-size: 14px;
}

input:focus, textarea:focus {
  border-color: rgba(138,180,255,0.6);
  box-shadow: 0 0 0 3px rgba(138,180,255,0.15);
}

/* BUTTONS */
button {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  background: linear-gradient(135deg, #0a84ff, #5ac8fa);
  color: white;
  transition: 0.2s ease;
}

button:hover {
  transform: scale(1.04);
  filter: brightness(1.1);
}

/* TEXT */
.card h2 {
  font-size: 22px;
  margin-bottom: 8px;
}

.card p {
  color: rgba(255,255,255,0.65);
  font-size: 14px;
  line-height: 1.5;
}

a {
  color: #8ab4ff;
  text-decoration: none;
}
a:hover { text-decoration: underline; }
</style>
</head>

<body>

<header>
  <h1>IDEA FORGE</h1>
  <p>Vision Pro–style invention space</p>
</header>

<div class="container">

  <!-- SUBMIT PANEL -->
  <div class="card">
    <h2>Submit Idea</h2>
    <input id="title" placeholder="Idea title"/>
    <textarea id="desc" placeholder="Describe your invention..."></textarea>
    <button onclick="submitIdea()">Submit Idea</button>
  </div>

  <!-- IDEAS FEED -->
  <div id="ideas"></div>

</div>

<script>
/* =========================
   CONFIG (CHANGE THIS)
========================= */
const USER = "brettross";
const REPO = "idea-forge";

/* =========================
   LOAD IDEAS (GitHub Issues)
========================= */
async function loadIdeas() {
  const res = await fetch(
    `https://api.github.com/repos/${USER}/${REPO}/issues`
  );

  const data = await res.json();
  const container = document.getElementById("ideas");

  container.innerHTML = "";

  data.forEach(issue => {
    container.innerHTML += `
      <div class="card">
        <h2>${issue.title}</h2>
        <p>${issue.body || ""}</p>

        <p>💬 Comments: ${issue.comments}</p>

        <a href="${issue.html_url}" target="_blank">
          Open on GitHub →
        </a>
      </div>
    `;
  });
}

/* =========================
   SUBMIT IDEA (GitHub API)
========================= */
async function submitIdea() {
  const title = document.getElementById("title").value;
  const body = document.getElementById("desc").value;

  if (!title || !body) return;

  const token = prompt("Paste your GitHub Personal Access Token");

  await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues`, {
    method: "POST",
    headers: {
      "Authorization": `token ${token}`,
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title,
      body
    })
  });

  document.getElementById("title").value = "";
  document.getElementById("desc").value = "";

  loadIdeas();
}

/* INIT */
loadIdeas();
</script>

</body>
</html>
